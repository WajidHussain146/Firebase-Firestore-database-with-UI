<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ASASports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
    }
    .auth-container { width: 100%; max-width: 420px; padding: 20px; }
    .auth-box {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(15px);
      border-radius: 16px; padding: 36px 32px; color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ── LOGO IMAGE ── */
    .auth-logo-wrap {
      display: flex; justify-content: center; margin-bottom: 18px;
    }
    .auth-logo-wrap img {
      height: 72px; width: auto;
      border-radius: 14px;
      object-fit: contain;
    }

    .auth-box h2 {
      text-align: center; margin-bottom: 24px;
      font-weight: 600; font-size: 20px; color: #f0f0f0;
    }
    .auth-box input {
      width: 100%; padding: 12px 14px; margin: 8px 0;
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
      outline: none; background: rgba(255,255,255,0.1);
      color: #fff; font-size: 14px; transition: border 0.2s;
    }
    .auth-box input:focus { border-color: #0f87c4; }
    .auth-box input::placeholder { color: #aaa; }
    .auth-box button {
      width: 100%; padding: 12px; margin-top: 10px;
      border: none; border-radius: 8px; background: #0f87c4;
      color: white; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: background 0.3s;
    }
    .auth-box button:hover { background: #0c6fa0; }
    .google-btn {
      background: #fff !important; color: #333 !important;
      display: flex !important; align-items: center; justify-content: center; gap: 10px;
    }
    .google-btn:hover { background: #e8e8e8 !important; }
    .divider { text-align: center; margin: 14px 0 4px; font-size: 13px; color: #aaa; }
    .auth-box p { text-align: center; margin-top: 16px; font-size: 14px; color: #ccc; }
    .auth-box a { color: #0f87c4; text-decoration: none; }
    .auth-box a:hover { text-decoration: underline; }
    #errorMsg {
      display: block; color: #ff6b6b; font-size: 13px;
      text-align: center; margin-top: 10px; min-height: 18px;
    }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-box">

    <!-- Logo Image (Requirement 5) -->
    <div class="auth-logo-wrap">
      <img src="image/logo (copy).png" alt="ASASports Logo" />
    </div>

    <h2>Welcome Back</h2>

    <form id="loginForm">
      <input type="email"    id="email"    placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password"      required />
      <button type="submit">Login</button>
    </form>

    <div class="divider">— or —</div>
    <button class="google-btn" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google" />
      Continue with Google
    </button>

    <span id="errorMsg"></span>
    <span id="successMsg" style="display:block;color:#22c55e;font-size:13px;text-align:center;margin-top:8px;min-height:18px;"></span>
    <p style="margin-top:8px;"><a href="#" id="forgotPasswordLink" style="color:#9ca3af;font-size:13px;">Forgot password?</a></p>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase.js"></script>
<script src="login.js"></script>
</body>
</html>
